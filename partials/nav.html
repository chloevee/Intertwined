<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Intertwined</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Krona+One&family=Lexend+Tera:wght@100..900&family=Lexend:wght@100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <header>
      <nav class="nav">
        <!-- LEFT -->
        <ul class="nav-left">
          <li class="dropdown-parent">
            <a href="about.html">ABOUT US</a>
          </li>

          <li class="dropdown-parent">
            <a href="#">RESOURCES</a>
            <ul class="dropdown">
              <li><a href="findings.html">Findings</a></li>
              <li><a href="helplines.html">Helplines</a></li>
              <li><a href="reference.html">Reference List</a></li>
            </ul>
          </li>
        </ul>

        <!-- LOGO (center on desktop, left on mobile via CSS order) -->
        <div class="nav-logo">
          <a href="index.html">
            <img src="assets/logo 2.png" alt="Intertwined Logo" />
          </a>
        </div>

        <!-- RIGHT -->
        <ul class="nav-right">
          <li class="dropdown-parent">
            <a href="#">ENTERTAINMENT</a>
            <ul class="dropdown">
              <li><a href="quiz.html">Personal Quiz</a></li>
              <li><a href="comicshome.html">Comics</a></li>
            </ul>
          </li>

          <li><a href="index.html#FAQs">FAQ</a></li>
        </ul>

        <!-- Hamburger (placeholder icon) -->
        <button class="nav-toggle" aria-label="Toggle navigation">
          <img src="/assets/menu-icon.svg" />
        </button>
      </nav>
    </header>
  </body>
  <script>
    // grab elements
    const nav = document.querySelector("nav.nav");
    const navToggle = document.querySelector(".nav-toggle");
    const dropdownTriggers = document.querySelectorAll(".dropdown-parent > a");

    // toggle whole menu (hamburger)
    if (nav && navToggle) {
      navToggle.addEventListener("click", function () {
        nav.classList.toggle("open");
        // console.log("nav toggled"); // you can uncomment to test
      });
    }

    // toggle dropdowns on mobile
    dropdownTriggers.forEach((trigger) => {
      trigger.addEventListener("click", function (e) {
        const dropdown = this.parentElement.querySelector(".dropdown");

        if (window.innerWidth <= 900 && dropdown) {
          e.preventDefault(); // don't navigate yet
          dropdown.classList.toggle("show");
        }
      });
    });
  </script>
</html>
